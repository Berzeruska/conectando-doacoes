<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat – Conectando Doações</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .chat-screen {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
    }
    .chat-header {
      background: var(--branco);
      border-bottom: 1px solid var(--borda);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .chat-header-info { flex: 1; min-width: 0; }
    .chat-header-titulo { font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-header-sub { font-size: 12px; color: var(--texto-sec); }
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; background: var(--fundo); }
    .encerrar-bar { background: var(--branco); border-top: 1px solid var(--borda); padding: 8px 12px; flex-shrink: 0; }
    .encerrado-banner { background: var(--fundo); border-top: 1px solid var(--borda); padding: 12px 16px; text-align: center; font-size: 13px; color: var(--texto-sec); flex-shrink: 0; }
  </style>
</head>
<body style="margin:0;padding:0;">
<div class="container" style="height:100vh;height:100dvh;">
<div class="chat-screen">

  <div class="chat-header">
    <button class="back-btn" id="btnVoltar" onclick="history.back()">←</button>
    <div class="chat-header-info">
      <div class="chat-header-titulo" id="chatTitulo">Carregando...</div>
      <div class="chat-header-sub" id="chatSub"></div>
    </div>
    <span class="badge" id="chatStatus"></span>
  </div>

  <div class="chat-messages" id="chatMensagens">
    <div class="empty-state" style="margin:auto;">
      <div class="spinner" style="border-color:var(--verde);border-top-color:transparent;width:32px;height:32px;margin:0 auto 12px;"></div>
      <p>Carregando mensagens...</p>
    </div>
  </div>

  <div class="chat-input-bar" id="inputBar" style="display:none;flex-shrink:0;">
    <input type="text" id="msgInput" placeholder="Digite uma mensagem..." onkeydown="if(event.key==='Enter')enviarMensagem()">
    <button class="send-btn" onclick="enviarMensagem()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <div class="encerrar-bar" id="encerrarBar" style="display:none;">
    <button class="btn btn-danger" onclick="encerrarDoacao()" style="padding:10px;">
      Encerrar – Doação concluída ✓
    </button>
  </div>

  <div class="encerrado-banner" id="encerradoBanner" style="display:none;">
    ✅ Esta doação foi concluída. O chat está somente leitura.
  </div>

</div>
</div>

<!-- Apenas os SDKs necessários — sem storage, sem database -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
  // Inicializa Firebase diretamente aqui, sem depender do firebase-config.js
  const firebaseConfig = {
    apiKey: "AIzaSyBd1MlxfBSliE6wgtPP6ms6YHKlgPqOuAE",
    authDomain: "doeja-2333f.firebaseapp.com",
    projectId: "doeja-2333f",
    messagingSenderId: "422261480544",
    appId: "1:422261480544:web:5c6148e65141cb53873705"
  };

  // Só inicializa se ainda não foi inicializado
  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }

  const auth = firebase.auth();
  const db = firebase.firestore();

  const params = new URLSearchParams(window.location.search);
  const conversaId = params.get('id');
  let uid = null;
  let conversa = null;
  let meuTipo = null;

  if (!conversaId) { window.location.href = 'index.html'; }

  auth.onAuthStateChanged(async (user) => {
    if (!user) { window.location.href = 'index.html'; return; }
    uid = user.uid;

    try {
      const convDoc = await db.collection('conversas').doc(conversaId).get();
      if (!convDoc.exists) { alert('Conversa não encontrada.'); history.back(); return; }
      conversa = convDoc.data();

      if (conversa.doadorId !== uid && conversa.instituicaoId !== uid) {
        alert('Sem permissão.');
        window.location.href = 'index.html';
        return;
      }

      meuTipo = conversa.doadorId === uid ? 'doador' : 'instituicao';

      const [anuncioDoc, outroDoc] = await Promise.all([
        db.collection('anuncios').doc(conversa.anuncioId).get(),
        db.collection('users').doc(meuTipo === 'doador' ? conversa.instituicaoId : conversa.doadorId).get()
      ]);

      const tituloAnuncio = anuncioDoc.exists ? anuncioDoc.data().titulo : 'Anúncio';
      const nomeOutro = outroDoc.exists ? (outroDoc.data().nomeInstituicao || outroDoc.data().nome || 'Participante') : 'Participante';

      document.getElementById('chatTitulo').textContent = tituloAnuncio;
      document.getElementById('chatSub').textContent = 'com ' + nomeOutro;
      document.title = tituloAnuncio + ' – Chat';

      const ativo = conversa.statusConversa === 'ativa';
      const statusEl = document.getElementById('chatStatus');
      statusEl.textContent = ativo ? 'Reservado' : 'Concluído';
      statusEl.className = 'badge ' + (ativo ? 'badge-reservado' : 'badge-finalizado');

      if (ativo) {
        document.getElementById('inputBar').style.display = 'flex';
        if (meuTipo === 'doador') {
          document.getElementById('encerrarBar').style.display = 'block';
        }
      } else {
        document.getElementById('encerradoBanner').style.display = 'block';
      }

      document.getElementById('btnVoltar').onclick = () => {
        window.location.href = meuTipo === 'doador' ? 'doador.html' : 'instituicao.html';
      };

      // Monitorar encerramento em tempo real
      db.collection('conversas').doc(conversaId).onSnapshot(snap => {
        if (snap.exists && snap.data().statusConversa === 'encerrada' && conversa.statusConversa === 'ativa') {
          conversa.statusConversa = 'encerrada';
          document.getElementById('inputBar').style.display = 'none';
          document.getElementById('encerrarBar').style.display = 'none';
          document.getElementById('encerradoBanner').style.display = 'block';
          statusEl.textContent = 'Concluído';
          statusEl.className = 'badge badge-finalizado';
        }
      });

      carregarMensagens();

    } catch(e) {
      console.error('Erro:', e);
      document.getElementById('chatMensagens').innerHTML =
        '<div class="empty-state" style="margin:auto;"><div class="empty-icon">⚠️</div><p>Erro: ' + escHTML(e.message) + '</p></div>';
    }
  });

  function carregarMensagens() {
    const el = document.getElementById('chatMensagens');
    // Usa Firestore para mensagens em tempo real
    db.collection('conversas').doc(conversaId)
      .collection('mensagens')
      .orderBy('timestamp', 'asc')
      .onSnapshot(snap => {
        if (snap.empty) {
          el.innerHTML = '<div class="empty-state" style="margin:auto;"><div class="empty-icon">💬</div><p>Nenhuma mensagem ainda.<br>Comece a conversa!</p></div>';
          return;
        }
        el.innerHTML = snap.docs.map(d => {
          const m = d.data();
          const meu = m.remetenteId === uid;
          let hora = '';
          if (m.timestamp && m.timestamp.toDate) {
            hora = m.timestamp.toDate().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
          }
          return `<div class="msg ${meu ? 'msg-out' : 'msg-in'}">
            <div class="msg-bubble">${escHTML(m.texto)}</div>
            <div class="msg-time">${hora}</div>
          </div>`;
        }).join('');
        el.scrollTop = el.scrollHeight;
      }, err => {
        console.error('Erro mensagens:', err);
        el.innerHTML = '<div class="empty-state" style="margin:auto;"><div class="empty-icon">⚠️</div><p>Erro ao carregar mensagens.<br>' + escHTML(err.message) + '</p></div>';
      });
  }

  async function enviarMensagem() {
    const input = document.getElementById('msgInput');
    const texto = input.value.trim();
    if (!texto || conversa.statusConversa !== 'ativa') return;
    input.value = '';
    input.disabled = true;
    try {
      await db.collection('conversas').doc(conversaId).collection('mensagens').add({
        texto,
        remetenteId: uid,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });
    } catch(e) {
      console.error('Erro ao enviar:', e);
      input.value = texto;
    } finally {
      input.disabled = false;
      input.focus();
    }
  }

  async function encerrarDoacao() {
    if (!confirm('Confirmar que a doação foi concluída? O chat ficará somente leitura.')) return;
    try {
      const batch = db.batch();
      batch.update(db.collection('conversas').doc(conversaId), { statusConversa: 'encerrada' });
      batch.update(db.collection('anuncios').doc(conversa.anuncioId), { status: 'finalizado' });
      await batch.commit();
      document.getElementById('inputBar').style.display = 'none';
      document.getElementById('encerrarBar').style.display = 'none';
      document.getElementById('encerradoBanner').style.display = 'block';
    } catch(e) {
      alert('Erro ao encerrar. Tente novamente.');
    }
  }

  function escHTML(str) {
    return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
</script>
</body>
</html>
